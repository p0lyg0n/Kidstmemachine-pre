<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>5m床＋赤マット3×5＋TV列（3D）</title>
  <style>
    html, body { height: 100%; margin: 0; background:#f3f5f7; overflow:hidden; }
    #c { display:block; width:100%; height:100%; }
    .hud {
      position: fixed; left: 12px; top: 12px;
      padding: 10px 12px; border-radius: 10px;
      background: rgba(255,255,255,.78); color: #111;
      font: 12px/1.5 system-ui, -apple-system, Segoe UI, Roboto, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      user-select:none;
      z-index: 10;
    }
    .sensorPanel {
      margin-top: 8px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .btn {
      border: 1px solid rgba(0,0,0,0.15);
      background: rgba(255,255,255,0.9);
      border-radius: 8px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 12px;
      line-height: 1.2;
    }
    .btn.active {
      border-color: rgba(0,0,0,0.35);
      background: rgba(230,238,248,0.95);
      font-weight: 700;
    }
    .hud b { font-weight: 700; }
    .hud .err { color: #ffb3b3; margin-top: 6px; display:none; }
    .hud .ok  { color: #1b6e1b; margin-top: 6px; display:none; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud" id="hud">
  <div><b>操作</b>：ドラッグ＝回転 / ホイール＝ズーム / 右ドラッグ＝平行移動</div>
  <div>スケール：1ユニット＝1m（床 3×5m、赤マット 3×5m、TVは55インチ相当で概算）</div>
  <div class="ok" id="ok">読み込みOK</div>
  <div id="dims" style="margin-top:6px; color:#111;"></div>
  <div class="sensorPanel" id="sensorPanel">
    <span><b>センサー</b></span>
    <label style="cursor:pointer;"><input type="radio" name="rig" value="2" checked> 2台</label>
    <label style="cursor:pointer;"><input type="radio" name="rig" value="4"> 4台</label>
    <label style="cursor:pointer;"><input type="checkbox" id="showSensors" checked> 表示</label>
    <label style="cursor:pointer;"><input type="checkbox" id="showFrustum" checked> 範囲</label>
    <label style="cursor:pointer;">高さ(mm):
      <button id="hDown" class="btn" type="button" title="-50mm" style="padding:2px 6px;">▼</button>
      <span id="hVal" style="display:inline-block; min-width:64px; text-align:right; font-variant-numeric: tabular-nums;">2400</span>
      <button id="hUp" class="btn" type="button" title="+50mm" style="padding:2px 6px;">▲</button>
    </label>
    <label style="cursor:pointer;">距離(mm):
      <button id="dDown" class="btn" type="button" title="-50mm" style="padding:2px 6px;">▼</button>
      <span id="dVal" style="display:inline-block; min-width:64px; text-align:right; font-variant-numeric: tabular-nums;">350</span>
      <button id="dUp" class="btn" type="button" title="+50mm" style="padding:2px 6px;">▲</button>
    </label>
  </div>
  <div class="err" id="err"></div>
</div>

<script>
  // モジュールの読み込み失敗や構文エラーは try/catch では拾えないことがあるので、
  // ここでグローバルに捕まえてHUDへ出します。
  window.addEventListener("error", (ev) => {
    const hudErr = document.getElementById("err");
    if (!hudErr) return;
    hudErr.style.display = "block";
    hudErr.textContent = ev?.message ? `Error: ${ev.message}` : "Error";
  });
  window.addEventListener("unhandledrejection", (ev) => {
    const hudErr = document.getElementById("err");
    if (!hudErr) return;
    hudErr.style.display = "block";
    hudErr.textContent = `Promise: ${String(ev.reason?.message ?? ev.reason)}`;
  });
</script>

<script type="module">
  // NOTE:
  // Canvas環境では three/examples のモジュールが内部で "three" を bare import するため、
  // CDN直参照だと「Failed to resolve module specifier 'three'」が出ることがあります。
  // esm.sh を使うと依存が解決された状態で配信されるため安定します。
  import * as THREE from "https://esm.sh/three@0.161.0";
  import { OrbitControls } from "https://esm.sh/three@0.161.0/examples/jsm/controls/OrbitControls.js";
  import { GLTFLoader } from "https://esm.sh/three@0.161.0/examples/jsm/loaders/GLTFLoader.js";

  const hudOk = document.getElementById("ok");
  const hudErr = document.getElementById("err");

  function showError(e) {
    console.error(e);
    hudErr.style.display = "block";
    hudErr.textContent = String(e?.message ?? e);
  }

  // ------------- 超簡易テスト（ブラウザ内で走る） -------------
  // テストが無いと壊れても気づきにくいので、最低限の前提だけ確認します。
  const tests = [];
  function test(name, fn) { tests.push({ name, fn }); }
  function assert(cond, msg) { if (!cond) throw new Error(msg); }

  try {
    // --------- 基本セットアップ ----------
    const canvas = document.getElementById("c");
    assert(canvas, "canvas(#c) が見つかりません");

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf3f5f7);

    const camera = new THREE.PerspectiveCamera(50, 1, 0.01, 200);
    camera.position.set(6, 4, 7);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0.8, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;

    // ライト
    const hemi = new THREE.HemisphereLight(0xffffff, 0xdde3ea, 1.25);
    scene.add(hemi);

    // 追加の環境光（影を潰さずに全体を明るくする）
    const amb = new THREE.AmbientLight(0xffffff, 0.55);
    scene.add(amb);

    const dir = new THREE.DirectionalLight(0xffffff, 1.6);
    dir.position.set(6, 10, 4);
    dir.castShadow = true;
    dir.shadow.mapSize.set(2048, 2048);
    dir.shadow.camera.left = -20;
    dir.shadow.camera.right = 20;
    dir.shadow.camera.top = 20;
    dir.shadow.camera.bottom = -20;
    scene.add(dir);

    // 床の寸法（1ユニット＝1m）
    const FLOOR_LEN = 5.0;   // 長辺（Z方向）
    const FLOOR_WID = 3.0;   // 短辺（X方向）
    const FLOOR_Y = 0.0;

    // 床（濃いグレー）
    const floorGeo = new THREE.BoxGeometry(FLOOR_WID, 0.06, FLOOR_LEN);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0xd6d0c7, roughness: 0.9, metalness: 0.02 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.position.set(0, FLOOR_Y + 0.03, 0);
    floor.receiveShadow = true;
    scene.add(floor);

    // 「手前」＝床のZマイナス側
    const zFrontEdge = -FLOOR_LEN / 2;

    // 目印グリッド（薄く）
    const grid = new THREE.GridHelper(12, 24, 0x9aa6b2, 0xc7d1db);
    grid.position.y = FLOOR_Y + 0.031;
    scene.add(grid);

    // 赤い床マット（TVの真ん前に 3m×5m）
    // ここでは床(3×5)と同じサイズのマットを、床の上に薄く敷く扱いにします。
    const MAT_LEN = 5.0; // Z方向
    const MAT_WID = 3.0; // X方向

    const matGeo = new THREE.BoxGeometry(MAT_WID, 0.015, MAT_LEN);
    const matMat = new THREE.MeshStandardMaterial({ color: 0xd84a5a, roughness: 0.92, metalness: 0.0 });
    const mat = new THREE.Mesh(matGeo, matMat);
    mat.receiveShadow = true;

    // TVは右側長辺に並び、画面は床の内側(−X方向)を向いているので、
    // マットは「TVの前＝床の内側」に敷かれる想定。
    // 今回は 3×5 で床と同一サイズ指定のため、床全体を覆う位置(中心)に置きます。
    mat.position.set(0, FLOOR_Y + 0.06 + 0.008, 0);

    // マット上面Y（TVをマットの上に置く）
    const matTopY = mat.position.y + 0.015 / 2; // 0.015 は mat の厚み
    scene.add(mat);

    const modelGroup = new THREE.Group();
    scene.add(modelGroup);

    const loader = new GLTFLoader();
    loader.load(
      "models/mams.glb",
      (gltf) => {
        const model = gltf.scene;
        const TARGET_HEIGHT = 1.05;
        model.scale.setScalar(1);
        model.updateMatrixWorld(true);
        const originalBbox = new THREE.Box3().setFromObject(model);
        const originalHeight = originalBbox.max.y - originalBbox.min.y;
        const scaleFactor = originalHeight > 0 ? TARGET_HEIGHT / originalHeight : 1;
        model.scale.setScalar(scaleFactor);
        model.updateMatrixWorld(true);
        const bbox = new THREE.Box3().setFromObject(model);
        const baseline = bbox.min.y;
        const drop = 0.03;
        model.position.set(0, matTopY - baseline - drop, 0);
        model.updateMatrixWorld(true);
        model.rotation.y = Math.PI;
        const topBox = new THREE.Box3().setFromObject(model);
        const heightLabel = makeTextSprite("坐高 約1050mm");
        heightLabel.scale.multiplyScalar(0.6);
        heightLabel.position.set(model.position.x, topBox.max.y + 0.05, model.position.z);
        modelGroup.add(heightLabel);
        model.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });
        modelGroup.add(model);
      },
      undefined,
      (err) => showError(err || new Error("モデルの読み込みに失敗しました"))
    );

    // --------- TV（55インチ相当の概算） ----------
    // 55inch 16:9 の外形は概ね 幅1.22m × 高さ0.71m
    const TV_W = 1.217; // 55インチ(16:9)の実寸に近い横幅(約1.217m)
    const TV_H = 0.71;
    const TV_D = 0.06;

    // 5mの長辺に「55インチ×4台」をちょうどよく並べる
    // 端の余白(EDGE_PAD_Z)を除いた有効長で、台数固定で隙間を自動計算します。
    const TV_COUNT = 4;
    // 端の余白（m）
    // 55インチ×4台を5mに収めるため、余白は薄めに設定。
    const EDGE_PAD_Z = 0.03;
    const usableLen = FLOOR_LEN - EDGE_PAD_Z * 2;
    const rawGap = (usableLen - TV_COUNT * TV_W) / (TV_COUNT - 1);
    const TV_GAP = Math.max(0, rawGap);

    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x0f0f10, roughness: 0.6, metalness: 0.15 });
    const screenMat = new THREE.MeshStandardMaterial({ color: 0x173a6b, roughness: 0.15, metalness: 0.0, emissive: 0x0f2c55, emissiveIntensity: 1.35 });

    function makeTV() {
      const group = new THREE.Group();

      // 本体（Xが厚み、Zが横幅）
      const body = new THREE.Mesh(new THREE.BoxGeometry(TV_D, TV_H, TV_W), bodyMat);
      body.castShadow = true;
      body.receiveShadow = true;
      group.add(body);

      // 画面
      const screen = new THREE.Mesh(new THREE.PlaneGeometry(TV_W * 0.96, TV_H * 0.92), screenMat);
      screen.position.x = TV_D / 2 + 0.001;
      screen.rotation.y = Math.PI / 2;
      group.add(screen);

      // 簡易スタンド
      const stand = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.05, 0.35), bodyMat);
      stand.position.set(-TV_D / 2 - 0.12, -TV_H / 2 + 0.06, 0);
      stand.castShadow = true;
      stand.receiveShadow = true;
      group.add(stand);

      return group;
    }

    // --------- 寸法表示（簡易） ----------
    function makeTextSprite(text) {
      const pad = 8;
      const fontSize = 26;
      const c = document.createElement("canvas");
      const ctx = c.getContext("2d");
      ctx.font = `${fontSize}px system-ui, -apple-system, Segoe UI, Roboto, Noto Sans JP, sans-serif`;
      const w = Math.ceil(ctx.measureText(text).width + pad * 2);
      const h = fontSize + pad * 2;
      c.width = w;
      c.height = h;

      // 背景
      ctx.fillStyle = "rgba(255,255,255,0.55)";
      ctx.fillRect(0, 0, w, h);
      ctx.strokeStyle = "rgba(0,0,0,0.10)";
      ctx.strokeRect(0.5, 0.5, w - 1, h - 1);

      // 文字
      ctx.font = `${fontSize}px system-ui, -apple-system, Segoe UI, Roboto, Noto Sans JP, sans-serif`;
      ctx.fillStyle = "rgba(0,0,0,0.72)";
      ctx.textBaseline = "middle";
      ctx.fillText(text, pad, h / 2);

      const tex = new THREE.CanvasTexture(c);
      tex.minFilter = THREE.LinearFilter;
      const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
      const spr = new THREE.Sprite(mat);
      // 1mあたりの見た目をいい感じに（経験則）
      const scale = 0.0065;
      spr.scale.set(w * scale, h * scale, 1);
      return spr;
    }

    function addDimensionLine(a, b, label, liftY = 0.02) {
      const geo = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(a.x, a.y + liftY, a.z),
        new THREE.Vector3(b.x, b.y + liftY, b.z),
      ]);
      const line = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0x2a2a2a }));
      scene.add(line);

      const mid = new THREE.Vector3().addVectors(a, b).multiplyScalar(0.5);
      const spr = makeTextSprite(label);
      spr.position.set(mid.x, mid.y + liftY + 0.12, mid.z);
      scene.add(spr);
      return { line, spr };
    }

    // mm表記
    const fmtMm = (m) => `${Math.round(m * 1000)}mm`;

    // --------- Femto Bolt センサー表示（配置＋範囲） ----------
    // ※視野角やレンジは機材仕様で調整してください（いまは見た目用の仮値）
    const SENSOR_HFOV_DEG = 70;   // 水平視野角（仮）
    const SENSOR_VFOV_DEG = 55;   // 垂直視野角（仮）
    const SENSOR_NEAR = 0.25;     // 近距離（m）
    const SENSOR_FAR  = 5.0;      // 到達距離（m）

    // センサー高さ・距離（UIで変更）
    // ※数値入力は使わず、上下ボタンだけで変更する
    //    高さ: 50mm刻み / 距離(中心から外側): 50mm刻み
    const SENSOR_HEIGHT_STEP_MM = 50;
    const SENSOR_DIST_STEP_MM = 50;

    const sensorUi = {
      rigRadios: Array.from(document.querySelectorAll('input[name="rig"]')),
      showSensors: document.getElementById('showSensors'),
      showFrustum: document.getElementById('showFrustum'),
      hDown: document.getElementById('hDown'),
      hUp: document.getElementById('hUp'),
      hVal: document.getElementById('hVal'),
      dDown: document.getElementById('dDown'),
      dUp: document.getElementById('dUp'),
      dVal: document.getElementById('dVal'),
      panel: document.getElementById('sensorPanel'),
    };

    // 共有URLなどで input 要素が落ちるケースがあるため、JSで代替UIを生成します。
    const uiState = {
      mode: 2,
      showSensors: true,
      showFrustum: true,
      sensorHeightMm: 2400,
      sensorDistMm: 350,
    };

    function ensureSensorUI() {
      const needFallback = (sensorUi.rigRadios.length === 0) || !sensorUi.showSensors || !sensorUi.showFrustum;
      if (!needFallback) {
        uiState.mode = currentMode();
        uiState.showSensors = !!sensorUi.showSensors.checked;
        uiState.showFrustum = !!sensorUi.showFrustum.checked;
        // 高さ/距離の表示初期化
        if (sensorUi.hVal) sensorUi.hVal.textContent = String(uiState.sensorHeightMm);
        if (sensorUi.dVal) sensorUi.dVal.textContent = String(uiState.sensorDistMm);
        return;
      }

      const panel = sensorUi.panel || document.getElementById('hud');
      const wrap = document.createElement('div');
      wrap.className = 'sensorPanel';
      wrap.style.marginTop = '8px';

      const title = document.createElement('span');
      title.innerHTML = '<b>センサー</b>';
      wrap.appendChild(title);

      const btn2 = document.createElement('button');
      btn2.type = 'button';
      btn2.className = 'btn';
      btn2.textContent = '2台';
      const btn4 = document.createElement('button');
      btn4.type = 'button';
      btn4.className = 'btn';
      btn4.textContent = '4台';

      const btnShow = document.createElement('button');
      btnShow.type = 'button';
      btnShow.className = 'btn';
      btnShow.textContent = '表示';

      const btnFr = document.createElement('button');
      btnFr.type = 'button';
      btnFr.className = 'btn';
      btnFr.textContent = '範囲';

      const heightWrap = document.createElement('span');
      heightWrap.style.display = 'inline-flex';
      heightWrap.style.alignItems = 'center';
      heightWrap.style.gap = '6px';
      heightWrap.innerHTML = '高さ(mm):';
      const heightVal = document.createElement('span');
      heightVal.style.display = 'inline-block';
      heightVal.style.minWidth = '64px';
      heightVal.style.textAlign = 'right';
      heightVal.style.fontVariantNumeric = 'tabular-nums';
      heightVal.textContent = String(uiState.sensorHeightMm);
      heightWrap.appendChild(heightVal);

      const refresh = () => {
        btn2.classList.toggle('active', uiState.mode === 2);
        btn4.classList.toggle('active', uiState.mode === 4);
        btnShow.classList.toggle('active', uiState.showSensors);
        btnFr.classList.toggle('active', uiState.showFrustum);
      };

      btn2.addEventListener('click', () => { uiState.mode = 2; setRig(2); refresh(); });
      btn4.addEventListener('click', () => { uiState.mode = 4; setRig(4); refresh(); });
      btnShow.addEventListener('click', () => {
        uiState.showSensors = !uiState.showSensors;
        if (sensorRig) sensorRig.visible = uiState.showSensors;
        refresh();
      });
      btnFr.addEventListener('click', () => {
        uiState.showFrustum = !uiState.showFrustum;
        if (sensorRig) {
          sensorRig.traverse(o => {
            if (o.name === 'frustum' || o.name === 'frustumLine' || o.name === 'frustumFill') o.visible = uiState.showFrustum;
          });
        }
        refresh();
      });

      const clampMm = (v) => Math.max(200, Math.min(6000, v));
      const clampDistMm = (v) => Math.max(0, Math.min(2000, v));

      const applyHeight = (v) => {
        uiState.sensorHeightMm = clampMm(v);
        heightVal.textContent = String(uiState.sensorHeightMm);
        setRig(currentMode());
      };

      down.addEventListener('click', () => applyHeight(uiState.sensorHeightMm - SENSOR_HEIGHT_STEP_MM));
      up.addEventListener('click', () => applyHeight(uiState.sensorHeightMm + SENSOR_HEIGHT_STEP_MM));

      wrap.appendChild(btn2);
      wrap.appendChild(btn4);
      wrap.appendChild(btnShow);
      wrap.appendChild(btnFr);
      wrap.appendChild(heightWrap);

      // 距離(mm) フォールバック
      const distWrap = document.createElement('span');
      distWrap.style.display = 'inline-flex';
      distWrap.style.alignItems = 'center';
      distWrap.style.gap = '6px';
      distWrap.innerHTML = '距離(mm):';

      const dDown = document.createElement('button');
      dDown.type = 'button';
      dDown.className = 'btn';
      dDown.textContent = '▼';
      dDown.style.padding = '2px 6px';

      const distVal = document.createElement('span');
      distVal.style.display = 'inline-block';
      distVal.style.minWidth = '64px';
      distVal.style.textAlign = 'right';
      distVal.style.fontVariantNumeric = 'tabular-nums';
      distVal.textContent = String(uiState.sensorDistMm);

      const dUp = document.createElement('button');
      dUp.type = 'button';
      dUp.className = 'btn';
      dUp.textContent = '▲';
      dUp.style.padding = '2px 6px';

      const applyDist = (v) => {
        uiState.sensorDistMm = clampDistMm(v);
        distVal.textContent = String(uiState.sensorDistMm);
        setRig(currentMode());
      };
      dDown.addEventListener('click', () => applyDist(uiState.sensorDistMm - SENSOR_DIST_STEP_MM));
      dUp.addEventListener('click', () => applyDist(uiState.sensorDistMm + SENSOR_DIST_STEP_MM));

      distWrap.appendChild(dDown);
      distWrap.appendChild(distVal);
      distWrap.appendChild(dUp);
      wrap.appendChild(distWrap);

      panel.appendChild(wrap);
      refresh();
    }

    let sensorRig = null;

    const deg2rad = (d) => (d * Math.PI) / 180;

    function createFrustumLines(hfovDeg, vfovDeg, near, far, color = 0x2a2a2a, opacity = 0.25) {
      const hf = Math.tan(deg2rad(hfovDeg / 2));
      const vf = Math.tan(deg2rad(vfovDeg / 2));

      // センサーのローカル座標：前方を -Z とする
      const nw = hf * near, nh = vf * near;
      const fw = hf * far,  fh = vf * far;

      const n0 = new THREE.Vector3(-nw, -nh, -near);
      const n1 = new THREE.Vector3( nw, -nh, -near);
      const n2 = new THREE.Vector3( nw,  nh, -near);
      const n3 = new THREE.Vector3(-nw,  nh, -near);

      const f0 = new THREE.Vector3(-fw, -fh, -far);
      const f1 = new THREE.Vector3( fw, -fh, -far);
      const f2 = new THREE.Vector3( fw,  fh, -far);
      const f3 = new THREE.Vector3(-fw,  fh, -far);

      const segs = [
        // near rect
        n0,n1, n1,n2, n2,n3, n3,n0,
        // far rect
        f0,f1, f1,f2, f2,f3, f3,f0,
        // connectors
        n0,f0, n1,f1, n2,f2, n3,f3,
      ];

      const geo = new THREE.BufferGeometry().setFromPoints(segs);
      const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity });
      return new THREE.LineSegments(geo, mat);
    }

    // 四角錐（視野）を半透明の面で塗る
    function createFrustumFill(hfovDeg, vfovDeg, near, far, color = 0x4f7cff, opacity = 0.09) {
      const hf = Math.tan(deg2rad(hfovDeg / 2));
      const vf = Math.tan(deg2rad(vfovDeg / 2));

      const nw = hf * near, nh = vf * near;
      const fw = hf * far,  fh = vf * far;

      // 8頂点（near 4 + far 4）: 前方を -Z
      const v = [
        [-nw, -nh, -near],
        [ nw, -nh, -near],
        [ nw,  nh, -near],
        [-nw,  nh, -near],
        [-fw, -fh, -far],
        [ fw, -fh, -far],
        [ fw,  fh, -far],
        [-fw,  fh, -far],
      ];

      const idx = [
        0,1,2, 0,2,3,
        4,6,5, 4,7,6,
        0,4,5, 0,5,1,
        1,5,6, 1,6,2,
        2,6,7, 2,7,3,
        3,7,4, 3,4,0,
      ];

      const pos = new Float32Array(v.flat());
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      geo.setIndex(idx);
      geo.computeVertexNormals();

      const mat = new THREE.MeshBasicMaterial({
        color,
        transparent: true,
        opacity,
        depthWrite: false,
        side: THREE.DoubleSide,
      });

      const mesh = new THREE.Mesh(geo, mat);
      mesh.renderOrder = 2;
      return mesh;
    }

    function createSensorMarker() {
      const g = new THREE.Group();
      // 小さな本体
      const body = new THREE.Mesh(
        new THREE.BoxGeometry(0.08, 0.04, 0.03),
        new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.6, metalness: 0.05 })
      );
      body.castShadow = true;
      body.receiveShadow = true;
      g.add(body);

      // レンズ側の目印（小さい板）
      const lens = new THREE.Mesh(
        new THREE.BoxGeometry(0.06, 0.03, 0.002),
        new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.3, metalness: 0.0 })
      );
      lens.position.z = -0.016;
      g.add(lens);

      return g;
    }

    function lookAtTarget(obj, target) {
      // three.jsのObject3Dはデフォルトで「-Z方向」が前方。
      // 今回のフラスタム表示が逆向きになっていたため、lookAt後に180度回して
      // 表示上の前方を合わせます。
      obj.lookAt(target);
      obj.rotateY(Math.PI);
    }

    function getSensorYMeters() {
      return Math.max(0.2, Math.min(6.0, uiState.sensorHeightMm / 1000));
    }

    function getSensorOutMeters() {
      return Math.max(0.0, Math.min(2.0, uiState.sensorDistMm / 1000));
    }

    function buildRig(mode) {
      const rig = new THREE.Group();

      // 見たい中心：マット中心（TV面も意識して少し+X側へ寄せる）
      // 2台運用は床面（マット面）を取りこぼしやすいので、少し低めを狙って“下に振る”。
      const targetY = (mode === 2) ? (matTopY + 0.05) : (matTopY + 0.35);
      const target = new THREE.Vector3(0.35, targetY, 0);

      // 2台運用は上下方向の余裕を少し増やす（見た目のスキャン範囲を現実寄りに）
      // 上側は削れても良い前提で、2台モードは床面（マット面）を確実に拾うため上下FOVを大きめにする
      const vfovDeg = (mode === 2) ? Math.max(SENSOR_VFOV_DEG, 85) : SENSOR_VFOV_DEG;

      // マット外周（床と同じ 3×5）
      const xL = -MAT_WID / 2;
      const xR =  MAT_WID / 2;
      const zF = -MAT_LEN / 2;
      const zB =  MAT_LEN / 2;

      // 外側へ少し逃がす（設置余白）
      const OUT = getSensorOutMeters();
      const y = getSensorYMeters();

      let positions = [];
      if (mode === 2) {
        // 2台の場合：マット（3×5）の短辺（3m側）に平行＝短辺側（Zの手前/奥）に2台を置く
        // → 中央を挟んで向かい合わせにすることで、マット面を均一にカバーしやすい
        // ※TV列が片側（+X側）にあるため、TV面まで厚く拾いたい場合は target を少しTV側へ寄せる
        positions = [
          new THREE.Vector3(0, y, zF - OUT),
          new THREE.Vector3(0, y, zB + OUT),
        ];
      } else {
        // 四隅
        positions = [
          new THREE.Vector3(xL - OUT, y, zF - OUT),
          new THREE.Vector3(xR + OUT, y, zF - OUT),
          new THREE.Vector3(xL - OUT, y, zB + OUT),
          new THREE.Vector3(xR + OUT, y, zB + OUT),
        ];
      }

      positions.forEach((p, idx) => {
        const s = new THREE.Group();
        s.position.copy(p);

        const marker = createSensorMarker();
        s.add(marker);

        const palette = [0x4f7cff, 0x62c370, 0xffb24a, 0xd86af0];
        const c = palette[idx % palette.length];

        const frFill = createFrustumFill(SENSOR_HFOV_DEG, vfovDeg, SENSOR_NEAR, SENSOR_FAR, c, 0.09);
        frFill.name = 'frustumFill';
        frFill.visible = sensorUi.showFrustum ? !!sensorUi.showFrustum.checked : uiState.showFrustum;
        s.add(frFill);

        const fr = createFrustumLines(SENSOR_HFOV_DEG, vfovDeg, SENSOR_NEAR, SENSOR_FAR, c, 0.25);
        fr.name = 'frustumLine';
        fr.visible = sensorUi.showFrustum ? !!sensorUi.showFrustum.checked : uiState.showFrustum;
        s.add(fr);

        lookAtTarget(s, target);

        // ラベル（小さめ）
        const label = makeTextSprite(`Femto ${idx + 1}`);
        label.position.set(0, 0.10, 0);
        s.add(label);

        rig.add(s);
      });

      rig.visible = sensorUi.showSensors ? !!sensorUi.showSensors.checked : uiState.showSensors;
      return rig;
    }

    function setRig(mode) {
      if (sensorRig) scene.remove(sensorRig);
      sensorRig = buildRig(mode);
      scene.add(sensorRig);
    }

    function currentMode() {
      const v = sensorUi.rigRadios.find(r => r.checked)?.value;
      if (v === '4') return 4;
      if (v === '2') return 2;
      return uiState.mode;
    }

    // UIイベント（inputが存在する場合のみ）
    sensorUi.rigRadios.forEach(r => r.addEventListener('change', () => setRig(currentMode())));
    sensorUi.showSensors?.addEventListener('change', () => {
      uiState.showSensors = !!sensorUi.showSensors.checked;
      if (sensorRig) sensorRig.visible = uiState.showSensors;
    });
    sensorUi.showFrustum?.addEventListener('change', () => {
      uiState.showFrustum = !!sensorUi.showFrustum.checked;
      if (!sensorRig) return;
      sensorRig.traverse(o => {
        if (o.name === 'frustum' || o.name === 'frustumLine' || o.name === 'frustumFill') o.visible = uiState.showFrustum;
      });
    });

    const clampMm = (v) => Math.max(200, Math.min(6000, v));
    const clampDistMm = (v) => Math.max(0, Math.min(2000, v));

    // 初期表示
    if (sensorUi.hVal) sensorUi.hVal.textContent = String(uiState.sensorHeightMm);
    if (sensorUi.dVal) sensorUi.dVal.textContent = String(uiState.sensorDistMm);

    function bumpHeight(deltaMm) {
      uiState.sensorHeightMm = clampMm(uiState.sensorHeightMm + deltaMm);
      if (sensorUi.hVal) sensorUi.hVal.textContent = String(uiState.sensorHeightMm);
      setRig(currentMode());
    }

    function bumpDist(deltaMm) {
      uiState.sensorDistMm = clampDistMm(uiState.sensorDistMm + deltaMm);
      if (sensorUi.dVal) sensorUi.dVal.textContent = String(uiState.sensorDistMm);
      setRig(currentMode());
    }

    sensorUi.hDown?.addEventListener('click', () => bumpHeight(-SENSOR_HEIGHT_STEP_MM));
    sensorUi.hUp?.addEventListener('click', () => bumpHeight(+SENSOR_HEIGHT_STEP_MM));
    sensorUi.dDown?.addEventListener('click', () => bumpDist(-SENSOR_DIST_STEP_MM));
    sensorUi.dUp?.addEventListener('click', () => bumpDist(+SENSOR_DIST_STEP_MM));

    
    // 初期セット
    ensureSensorUI();
    setRig(currentMode());

    // 床寸法（上面付近に表示）
    const floorTopY = FLOOR_Y + 0.06;
    const xLeftEdge = -FLOOR_WID / 2;
    const xRightEdge = FLOOR_WID / 2;
    const zBackEdge = FLOOR_LEN / 2;

    // 長さ 5m（左側の縁）
    addDimensionLine(
      new THREE.Vector3(xLeftEdge, floorTopY, zFrontEdge),
      new THREE.Vector3(xLeftEdge, floorTopY, zBackEdge),
      `床L ${fmtMm(FLOOR_LEN)}`
    );
    // 幅 3m（手前の縁）
    addDimensionLine(
      new THREE.Vector3(xLeftEdge, floorTopY, zFrontEdge),
      new THREE.Vector3(xRightEdge, floorTopY, zFrontEdge),
      `床W ${fmtMm(FLOOR_WID)}`
    );

    const startZ = zFrontEdge + EDGE_PAD_Z + (TV_W / 2);
    const tvPitch = TV_W + TV_GAP;

    // TVのX/Y位置（右側長辺に沿って設置）
    // ※このブロックは後で再利用するので、ここで先に定義しておきます。
    const TV_OFFSET_FROM_EDGE = 0.15;
    const xRightEdgeTV = FLOOR_WID / 2;
    const tvX = xRightEdgeTV - TV_OFFSET_FROM_EDGE - TV_D / 2;
    // TVはマット上に設置（マット上面から 40mm 浮かせる）
    const TV_RAISE = 0.04; // 40mm
    const tvY = matTopY + TV_RAISE + TV_H / 2;

    for (let i = 0; i < TV_COUNT; i++) {
      const tv = makeTV();
      const z = startZ + i * tvPitch;

      tv.position.set(tvX, tvY, z);
      // 画面が床の内側を向くように
      tv.rotation.y = Math.PI;
      scene.add(tv);
    }

    // TV高さとマットからの高さ（代表1台の位置で表示）
    const tvBottom = tvY - TV_H / 2;
    // マット上面〜TV下端
    const clearance = tvBottom - matTopY;

    // TVパネル高さ（縦方向）
    addDimensionLine(
      new THREE.Vector3(tvX - 0.35, tvBottom, startZ),
      new THREE.Vector3(tvX - 0.35, tvBottom + TV_H, startZ),
      `TVH ${fmtMm(TV_H)}`,
      0.0
    );
    // 床上〜TV下端
    addDimensionLine(
      new THREE.Vector3(tvX - 0.55, matTopY, startZ),
      new THREE.Vector3(tvX - 0.55, tvBottom, startZ),
      `マット→TV下 ${fmtMm(clearance)}`,
      0.0
    );

    // --------- テスト定義 ----------
    test("THREE がロードできている", () => assert(!!THREE && typeof THREE.Scene === "function", "THREE が未定義です"));
    test("OrbitControls がロードできている", () => assert(typeof OrbitControls === "function", "OrbitControls が未定義です"));
    test("床サイズが正の値", () => {
      assert(FLOOR_LEN > 0 && FLOOR_WID > 0, "床サイズが不正です");
    });
    test("赤いマットが 3m×5m", () => {
      // ここでは MAT_WID/MAT_LEN をそのまま検証
      assert(MAT_WID === 3.0 && MAT_LEN === 5.0, `マット寸法が違います: ${MAT_WID}x${MAT_LEN}`);
    });
    test("TVが4台に固定される", () => assert(TV_COUNT === 4, "TV_COUNT が 4 ではありません"));
    test("TVの隙間が負にならない", () => assert(TV_GAP >= 0, `TV_GAP が負です: ${TV_GAP}`));
    test("55インチ×4台が5mに収まる", () => {
      const total = TV_COUNT * TV_W + (TV_COUNT - 1) * TV_GAP + EDGE_PAD_Z * 2;
      assert(total <= FLOOR_LEN + 1e-6, `全長オーバー: ${total}m`);
    });
    test("TVがマットから40mm浮いている", () => {
      assert(Math.abs(clearance - TV_RAISE) < 1e-9, `浮き量が違います: ${clearance}m`);
    });
    test("センサー台数が切替可能", () => {
      assert(currentMode() === 2 || currentMode() === 4, `不正なモード: ${currentMode()}`);
    });
    test("2台モードは床面を拾いやすいように下向き寄り", () => {
      // targetY は buildRig 内のローカルなので、ここでは vfovDeg の下限をテストする
      const vf = Math.max(SENSOR_VFOV_DEG, 85);
      assert(vf >= 85, "2台モードのVFOV拡張が効いていません");
    });

    // --------- テスト実行 ----------
    for (const t of tests) {
      try { t.fn(); }
      catch (e) { throw new Error(`テスト失敗: ${t.name} / ${e.message}`); }
    }

    hudOk.style.display = "block";

    // HUDに寸法まとめ
    const dims = document.getElementById("dims");
    if (dims) {
      dims.textContent = `床: ${fmtMm(FLOOR_WID)}×${fmtMm(FLOOR_LEN)} / マット: ${fmtMm(MAT_WID)}×${fmtMm(MAT_LEN)} / TV: 55\"（約${fmtMm(TV_W)}×${fmtMm(TV_H)}）×${TV_COUNT}台 / センサー高: ${fmtMm(getSensorYMeters())} / 距離: ${fmtMm(getSensorOutMeters())} / 端余白: ${fmtMm(EDGE_PAD_Z)} / 隙間: ${fmtMm(TV_GAP)} / 浮き: ${fmtMm(TV_RAISE)}`;
    }

    // --------- リサイズ ----------
    function resize() {
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }
    window.addEventListener("resize", resize);
    resize();

    // --------- ループ ----------
    renderer.setAnimationLoop(() => {
      controls.update();
      renderer.render(scene, camera);
    });

  } catch (e) {
    showError(e);
  }
</script>
</body>
</html>
